name: Regional District Nanaimo

on:
  workflow_dispatch: # Allows manual trigger
  schedule:
    - cron: '2 1 * * 1-6'
# Prevent overlapping runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IPROYAL_USERNAME: ${{ secrets.IPROYAL_USERNAME }}
  IPROYAL_PASSWORD: ${{ secrets.IPROYAL_PASSWORD }}
  IPROYAL_API_TOKEN: ${{ secrets.IPROYAL_API_TOKEN }}
  PY_COLORS: "1"
  DISPLAY: ":99"
  # Optional: PROXY_URL: ${{ steps.get_proxy.outputs.PROXY_URL }} if you re-enable proxy fetching
  BASE_DIR: "screenshots"
  GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
  YS_APIURL: ${{ secrets.YS_APIURL }} # Map YS_APIURL_DEV to YS_APIURL
  YS_COMPONENTID: 10
  HIDE_TINY_URL: False
  GH_WORKFLOW_NAME: ${{ github.workflow }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
  PROXY_URL: ${{ secrets.PROXY_URL_WITH_PASS }}


# we need multiple jobs to account for bot throttling
# just manually reset proxies
jobs:
  scraper_job:
    runs-on: macosx-latest
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        python-version: ['3.13']
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          
      - name: Install Google Chrome (Windows)
        run: choco install googlechrome || true

      - name: Install Google Chrome (macOS)
        run: |
          brew update
          brew install --cask google-chrome || true

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pydoll-python requests lxml unidecode python-dateutil html5lib beautifulsoup4
            
      - name: Run Pydoll script
        run: python -m lib.rdn.scraper

      - name: Upload Raw Data for Processing
        if: success()
        uses: actions/upload-artifact@v4
        with:
          # Use a unique name per python version
          name: raw-data-${{ matrix.python-version }}
          path: |
            screenshots_rdn/
          retention-days: 1

  processor_job:
    runs-on: macos-latest
    needs: scraper_job
    # This ensures it runs if ANY of the matrix jobs succeeded
    if: always() && contains(needs.scraper_job.result, 'success')
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Download Scraped Data
        uses: actions/download-artifact@v4
        with:
          # This grabs the artifact from whichever version succeeded first/last
          # merge-multiple helps if more than one succeeded
          pattern: raw-data-*
          merge-multiple: true

      - name: Handle scrapped data
        run: |
          ls
          ls screenshots_rdn
          pip install -r requirements.txt
          pip install -r requirements_tenders.txt
          python -m lib.rdn.dataprocessor
          rm -rf data/city.csv

      - name: Upload Processed CSV
        uses: actions/upload-artifact@v4
        with:
          name: screenshots_rdn
          path: screenshots_rdn

      - name: Upload Data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: upload_data
          path: data/
