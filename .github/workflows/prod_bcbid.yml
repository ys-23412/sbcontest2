name: BC BID

on:
  workflow_dispatch: # Allows manual trigger

  # we are testing to see if this works or not
  schedule:
    # 8:30 AM PST (16:30 UTC)
    # 12:30 PM PST (20:30 UTC)
    # 6:00 PM PST (01:00 UTC next day)
    # we do not want the throttle the api, shift the time slightly.
    - cron: '21 15,19 * * 1-5'
    - cron: '47 23 * * 1-5'
    - cron: '21 19 * * 6'
    - cron: '47 23 * * 6'

# Prevent overlapping runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IPROYAL_USERNAME: ${{ secrets.IPROYAL_USERNAME }}
  IPROYAL_PASSWORD: ${{ secrets.IPROYAL_PASSWORD }}
  IPROYAL_API_TOKEN: ${{ secrets.IPROYAL_API_TOKEN }}
  PY_COLORS: "1"
  DISPLAY: ":99"
  # Optional: PROXY_URL: ${{ steps.get_proxy.outputs.PROXY_URL }} if you re-enable proxy fetching
  BASE_DIR: "screenshots"
  GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
  YS_APIURL: ${{ secrets.YS_APIURL }} # Map YS_APIURL_DEV to YS_APIURL
  YS_COMPONENTID: 10
  HIDE_TINY_URL: False
  GH_WORKFLOW_NAME: ${{ github.workflow }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}


# we need multiple jobs to account for bot throttling
jobs:
  scraper_job:
    runs-on: macos-latest
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          
      - name: Install Google Chrome (macOS)
        run: |
          brew update
          brew install --cask google-chrome

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pydoll-python requests lxml unidecode python-dateutil html5lib beautifulsoup4
            
      - name: Run Pydoll script
        run: python -m lib.bcbid_scraper

      - name: Upload Raw Data for Processing
        if: success()
        uses: actions/upload-artifact@v4
        with:
          # Use a unique name per python version
          name: raw-data-${{ matrix.python-version }}
          path: |
            bcbid.html
            screenshots/
          retention-days: 1

  processor_job:
    runs-on: macos-latest
    needs: scraper_job
    # This ensures it runs if ANY of the matrix jobs succeeded
    if: always() && contains(needs.scraper_job.result, 'success')
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Download Scraped Data
        uses: actions/download-artifact@v4
        with:
          # This grabs the artifact from whichever version succeeded first/last
          # merge-multiple helps if more than one succeeded
          pattern: raw-data-*
          merge-multiple: true

      - name: Handle scrapped data
        run: |
          ls
          ls screenshots
          pip install -r requirements.txt
          pip install -r requirements_tenders.txt
          python -m lib.bcbid_dataprocessor
          rm -rf data/city.csv

      - name: Upload Processed CSV
        uses: actions/upload-artifact@v4
        with:
          name: results-csv
          path: bid_recent.csv

      - name: Upload Data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: upload_data
          path: data/