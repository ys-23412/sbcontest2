name: Single Day Schedule Jobs Dev

on:
  workflow_dispatch:
      inputs:
        target_job:
          description: 'Which job to run'
          required: true
          default: 'rdn'
          type: choice
          options:
            - rdn
            - porthardy
            - canadabuys
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IPROYAL_USERNAME: ${{ secrets.IPROYAL_USERNAME }}
  IPROYAL_PASSWORD: ${{ secrets.IPROYAL_PASSWORD }}
  IPROYAL_API_TOKEN: ${{ secrets.IPROYAL_API_TOKEN }}
  PY_COLORS: "1"
  DISPLAY: ":99"
  GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
  YS_APIURL: ${{ secrets.YS_APIURL_DEV }} # Map YS_APIURL_DEV to YS_APIURL
  YS_COMPONENTID: 10
  HIDE_TINY_URL: False
  GH_WORKFLOW_NAME: ${{ github.workflow }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
  PROXY_URL: ${{ secrets.PROXY_URL_WITH_PASS }}
  FILE_DIR: "screenshots"
  NEW_BID_DAYS_THRESHOLD: 7


# we need multiple jobs to account for bot throttling
# just manually reset proxies
jobs:
  scraper_job_rdn:
    if: ${{ github.event.inputs.target_job == 'rdn' }}
    runs-on: windows-latest
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        python-version: ['3.13']
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          
      - name: Install Google Chrome (Windows)
        run: choco install googlechrome || true

      # - name: Install Google Chrome (macOS)
      #   run: |
      #     brew update
      #     brew install --cask google-chrome || true

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pydoll-python requests lxml unidecode python-dateutil html5lib beautifulsoup4
            
      - name: Run Pydoll script
        run: python -m lib.rdn.scraper

      - name: Upload Raw Data for Processing
        if: success()
        uses: actions/upload-artifact@v4
        with:
          # Use a unique name per python version
          name: raw-data-${{ matrix.python-version }}
          path: |
            screenshots_rdn
            screenshots
          retention-days: 1

  processor_job_rdn:
    runs-on: macos-latest
    needs: scraper_job_rdn
    # This ensures it runs if ANY of the matrix jobs succeeded
    if: always() && contains(needs.scraper_job_rdn.result, 'success')
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Download Scraped Data
        uses: actions/download-artifact@v4
        with:
          # This grabs the artifact from whichever version succeeded first/last
          # merge-multiple helps if more than one succeeded
          pattern: raw-data-*
          merge-multiple: true

      - name: Handle scrapped data
        run: |
          ls
          ls screenshots
          pip install -r requirements.txt
          pip install -r requirements_tenders.txt
          python -m lib.rdn.dataprocessor
          rm -rf data/city.csv

      - name: Upload Processed CSV
        uses: actions/upload-artifact@v4
        with:
          name: screenshots_rdn
          path: screenshots_rdn

      - name: Upload Data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: upload_data
          path: data/

  # ==========================================
  # DISTRICT OF PORT HARDY JOBS
  # ==========================================
  scraper_job_porthardy:
    if: ${{ github.event.inputs.target_job == 'porthardy' }}
    runs-on: windows-latest
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        python-version: ['3.13']
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          
      - name: Install Google Chrome (Windows)
        run: choco install googlechrome || true

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pydoll-python requests lxml unidecode python-dateutil html5lib beautifulsoup4
            
      - name: Run Port Hardy Pydoll script
        run: python -m lib.hardy.scraper

      - name: Upload Port Hardy Raw Data for Processing
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: raw-data-porthardy-${{ matrix.python-version }}
          path: |
            screenshots_porthardy
            screenshots
          retention-days: 1

  processor_job_porthardy:
    runs-on: macos-latest
    needs: scraper_job_porthardy
    if: always() && contains(needs.scraper_job_porthardy.result, 'success')
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Download Scraped Data
        uses: actions/download-artifact@v4
        with:
          pattern: raw-data-porthardy-*
          merge-multiple: true

      - name: Handle Port Hardy scrapped data
        run: |
          ls
          ls screenshots || true
          pip install -r requirements.txt
          pip install -r requirements_tenders.txt
          python -m lib.hardy.dataprocessor
          rm -rf data/city.csv

      - name: Upload Processed CSV
        uses: actions/upload-artifact@v4
        with:
          name: screenshots_porthardy
          path: screenshots_porthardy

      - name: Upload Data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: upload_data_porthardy
          path: data/

  # ==========================================
  # CANADABUYS JOBS
  # ==========================================
  scraper_job_canadabuys:
    if: ${{ github.event.inputs.target_job == 'canadabuys' }}
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        python-version: ['3.13']
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          
      - name: Install Chrome manually
        run: |
          sudo apt update
          sudo apt install -y wget
          wget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt install -y ./google-chrome-stable_current_amd64.deb

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pydoll-python requests lxml unidecode python-dateutil html5lib beautifulsoup4
            
      - name: Run CanadaBuys Pydoll script
        run: python -m lib.canadabuys_scraper

      - name: Upload CanadaBuys Raw Data for Processing
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: raw-data-canadabuys-${{ matrix.python-version }}
          path: |
            screenshots_canadabuys/
          retention-days: 3

  processor_job_canadabuys:
    runs-on: macos-latest
    needs: scraper_job_canadabuys
    if: always() && contains(needs.scraper_job_canadabuys.result, 'success')
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Download Scraped Data
        uses: actions/download-artifact@v4
        with:
          pattern: raw-data-canadabuys-*
          merge-multiple: true

      - name: Handle CanadaBuys scrapped data
        run: |
          pip install -r requirements.txt
          pip install -r requirements_tenders.txt
          python -m lib.canadabuys_dataprocessor
          rm -rf data/city.csv

      - name: Upload Processed CSV folder
        uses: actions/upload-artifact@v4
        with:
          name: screenshots_canadabuys
          path: screenshots_canadabuys/

      - name: Upload Data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: upload_data_canadabuys
          path: data/