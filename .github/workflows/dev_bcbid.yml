name: Dev BC BID

on:
  workflow_dispatch: # Allows manual trigger
  push:
    branches:
      - 'feature/bcbid'

env:
  IPROYAL_USERNAME: ${{ secrets.IPROYAL_USERNAME }}
  IPROYAL_PASSWORD: ${{ secrets.IPROYAL_PASSWORD }}
  IPROYAL_API_TOKEN: ${{ secrets.IPROYAL_API_TOKEN }}

jobs:
  bcbidsb:
    runs-on: macos-latest # Changed to macOS
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # Recommended stable version
          
      - name: Install Google Chrome (macOS)
        run: |
          brew update
          brew install --cask google-chrome

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          # Install pydoll and keep your previous dependencies
          pip install pydoll-python requests pandas lxml
          
      - name: Run Browser Automation and Record macOS Session
        run: |
          # 1. Create directory for video recordings
          mkdir -p video_recordings
          VIDEO_OUTPUT_PATH="video_recordings/session.mp4"
          
          # 2. Start FFmpeg recording in the background using AVFoundation (macOS native)
          # On a headless macOS runner without webcams, display index "0" is the main screen.
          echo "Starting macOS screen recording..."
          ffmpeg -y -f avfoundation -framerate 15 -i "0" -c:v libx264 -preset medium -crf 28 -pix_fmt yuv420p "$VIDEO_OUTPUT_PATH" &
          
          # Store the FFmpeg process ID
          FFMPEG_PID=$!
          echo "FFmpeg recording started with PID: $FFMPEG_PID"
          
          # Give FFmpeg a second to initialize
          sleep 2
          
          # 3. Run your browser automation script
          # Note: run path directly, not with -m
          echo "Running scraper..."
          python lib/bcbid.py
          
          # 4. Stop FFmpeg recording gracefully
          echo "Stopping FFmpeg recording..."
          kill -s SIGINT $FFMPEG_PID || true # Send SIGINT to FFmpeg to stop
          wait $FFMPEG_PID || true # Wait for FFmpeg process to fully terminate
          
          echo "Video recording completed: $VIDEO_OUTPUT_PATH"

      - name: Upload Video Recording
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: video-recording
          path: video_recordings/session.mp4

          
      - name: Upload HTML output
        if: always() # Upload even if previous steps fail
        uses: actions/upload-artifact@v4
        with:
          name: rhtmls
          path: bcbid.html 

      - name: Upload CSV Results
        if: always() # Upload even if previous steps fail
        uses: actions/upload-artifact@v4
        with:
          name: results
          path: bid_recent.csv
  
      - name: Upload CSV Results
        if: always() # Upload even if previous steps fail
        uses: actions/upload-artifact@v4
        with:
          name: screenshoots
          path: screenshots