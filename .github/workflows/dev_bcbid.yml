name: Dev BC BID

on:
  workflow_dispatch: # Allows manual trigger
  push:
    branches:
      - 'feature/bcbid'

env:
  IPROYAL_USERNAME: ${{ secrets.IPROYAL_USERNAME }}
  IPROYAL_PASSWORD: ${{ secrets.IPROYAL_PASSWORD }}
  IPROYAL_API_TOKEN: ${{ secrets.IPROYAL_API_TOKEN }}
  PY_COLORS: "1"
  DISPLAY: ":99"
  # Optional: PROXY_URL: ${{ steps.get_proxy.outputs.PROXY_URL }} if you re-enable proxy fetching
  BASE_DIR: "screenshots"
  GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
  YS_APIURL: ${{ secrets.YS_APIURL_DEV }} # Map YS_APIURL_DEV to YS_APIURL
  YS_COMPONENTID: 10
  HIDE_TINY_URL: True
  GH_WORKFLOW_NAME: ${{ github.workflow }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

jobs:
  bcbidsb:
    runs-on: macos-26-intel
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # Recommended stable version
          
      # - name: Install Google Chrome (macOS)
      #   run: |
      #     brew update
      #     brew install --cask google-chrome
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable # You can change this to 'latest' or a specific version like '120' if needed

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          # Install pydoll and keep your previous dependencies
          pip install pandas pydoll-python requests lxml unidecode python-dateutil
            
      - name: Run Pydoll script
        run: |
          python -m lib.bcbid_scraper

      - name: Handle scrapped data
        run: |
          python -m lib.bcbid_dataprocessor
          # we dont want to reupload the data folder
          rm -rf data/city.csv
          
      - name: Upload HTML output
        if: always() # Upload even if previous steps fail
        uses: actions/upload-artifact@v4
        with:
          name: rhtmls
          path: bcbid.html 

      - name: Upload CSV Results
        if: always() # Upload even if previous steps fail
        uses: actions/upload-artifact@v4
        with:
          name: results
          path: bid_recent.csv
  
      - name: Upload CSV Results
        if: always() # Upload even if previous steps fail
        uses: actions/upload-artifact@v4
        with:
          name: screenshoots
          path: screenshots