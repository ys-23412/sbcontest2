name: Dev BC BID

on:
  workflow_dispatch: # Allows manual trigger
  push:
    branches:
      - 'feature/bcbid'

env:
  IPROYAL_USERNAME: ${{ secrets.IPROYAL_USERNAME }}
  IPROYAL_PASSWORD: ${{ secrets.IPROYAL_PASSWORD }}
  IPROYAL_API_TOKEN: ${{ secrets.IPROYAL_API_TOKEN }}

jobs:
  bcbidsb:
    runs-on: macos-latest # Changed to macOS
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # Recommended stable version
          
      - name: Install Google Chrome (macOS)
        run: |
          brew update
          brew install --cask google-chrome

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          # Install pydoll and keep your previous dependencies
          pip install pydoll requests pandas lxml
          
      - name: Run Pydoll script
        run: |
          python lib/bcbid.py
          
      - name: Upload HTML output
        if: always() # Upload even if previous steps fail
        uses: actions/upload-artifact@v4
        with:
          name: rhtmls
          path: bcbid.html 

      - name: Upload CSV Results
        if: always() # Upload even if previous steps fail
        uses: actions/upload-artifact@v4
        with:
          name: results
          path: bid_recent.csv
  